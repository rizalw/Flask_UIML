<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Available Dataset</title>
</head>
<body>
    <h1>List of Available Dataset</h1>
    {% if dataset_list | length < 1%}
    <h4>No available Dataset. Please insert a new one</h4>
    {% else %}
    <table border="1">
        <tr>
            <th>#</th>
            <td>Name</td>
            <td>Action</td>
        </tr>
        {% for dataset in dataset_list %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ dataset.name}}</td>
            <td>
                <a href="/dataset_data/update/{{dataset.id}}">Update</a><br>
                <a href="/dataset_data/delete/{{dataset.id}}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
    <br>
    {% endif%}
    <h2>Add New Dataset</h2>
    <form action="" method="post">
        <label for="">Dataset name</label><br>
        <input type="text" name="dataset_name" id="" placeholder="iris plant dataset"><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
